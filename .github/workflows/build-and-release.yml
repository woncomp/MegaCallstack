name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: msbuild -t:restore MegaCallstack.sln

      - name: Build solution (Release)
        run: msbuild MegaCallstack.sln /p:Configuration=Release /p:DeployExtension=false

      - name: Run unit tests
        run: dotnet test MegaCallstack.Tests/MegaCallstack.Tests.csproj --configuration Release --no-build

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: MegaCallstack.vsix
          path: MegaCallstack\MegaCallstack\bin\Release\MegaCallstack.vsix

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: MegaCallstack.vsix
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/MegaCallstack.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
